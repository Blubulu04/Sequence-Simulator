<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Sequence Circuit Simulator Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</head>
<body>
    <div id="toolbar">
        <h2>🛠️ 도구 모음</h2>
        
        <div class="panel">
            <h3>동작 모드</h3>
            <button id="btn-mode-SELECT" class="mode-btn active" onclick="setMode('SELECT')">👆 선택 / 이동</button>
            <button id="btn-mode-WIRE" class="mode-btn" onclick="setMode('WIRE')">✏️ 배선 (선긋기)</button>
            <button id="btn-mode-DELETE" class="mode-btn" onclick="setMode('DELETE')">🗑️ 삭제 모드</button>
        </div>

        <div class="panel">
            <h3>부품 추가</h3>
            <button onclick="addComponent('L')">L (전원)</button>
            <button onclick="addComponent('N')">N (중성선)</button>
            <button onclick="addComponent('PB_NO')">PB (A접점 - NO)</button>
            <button onclick="addComponent('PB_NC')">PB (B접점 - NC)</button>
            <button onclick="addComponent('LAMP')">램프 (출력)</button>
            <button onclick="addComponent('RELAY')">MY2N 릴레이 (8핀)</button>
        </div>

        <div class="panel">
            <h3>시뮬레이션</h3>
            <button id="btn-sim" class="sim-btn" onclick="toggleSimulation()">▶️ 시뮬레이션 시작</button>
        </div>
    </div>

    <svg id="workspace" 
         onmousedown="handleMouseDown(event)" 
         onmousemove="handleMouseMove(event)" 
         onmouseup="handleMouseUp(event)" 
         onmouseleave="handleMouseUp(event)"
         oncontextmenu="return false;">
        <g id="wire-layer"></g>
        <g id="component-layer"></g>
        <g id="ui-layer"></g>
    </svg>

    <script src="components.js"></script>
    <script src="wiring.js"></script>
    <script src="simulator.js"></script>
    <script src="script.js"></script>
</body>
</html>
